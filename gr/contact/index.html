<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Επικοινωνία - GKBM</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="header">
        <div class="lang-bar">
            <a href="index.html"><img class="flag" alt="flag-gb" src="GB.png"></a>
            <a href="index-gr.html"><img class="flag" alt="flag-gr" src="GR.png"></a>
            <a href="index-cn.html"><img class="flag" alt="flag-cn" src="CN.png"></a>
        </div>
        <img class="logo-header" alt="logo-header" src="logo.png">
        <div class="menu-header">
            <a class="menu-header" href="">Αρχική</a>
            <a class="menu-header" href="">Σχετικά</a>
            <a class="menu-header" href="">Επικοινωνία</a>
        </div>
    </div>
    <h2 class="contact-us">Επικοινωνήστε μαζί μας:</h2>
    <div class="split">
        <iframe src="https://www.google.com/maps/embed?pb=..." width="450" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        <div class="contact-form">
            <form action="https://formsubmit.co/tap2addgr@gmail.com" method="POST">
                <input type="text" name="name" placeholder="Το Όνομά σας" required>
                <input type="email" name="email" placeholder="Το Email σας" required>
                <textarea name="message" rows="5" placeholder="Το Μήνυμά σας" required></textarea>
                <button type="submit">Αποστολή Μηνύματος</button>
            </form>
        </div>
    </div>
</body>
</html>
